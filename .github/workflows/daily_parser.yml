name: Daily Parser

on:
  schedule:
    # Запускаем каждый день в 6:00 UTC (9:00 МСК)
    - cron: '0 6 * * *'
  # Возможность ручного запуска
  workflow_dispatch:

jobs:
  parse-vacancies:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run parser
      run: python run_parser_auto.py

    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/raw/ data/vacancies.db last_run.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update vacancies $(date +'%Y-%m-%d')"
        git push